# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
language: ko-KR
tone_instructions: >-
  동료에게 피드백하듯 차분하고 존중하는 톤으로 작성합니다.
  단정적 지시 대신 제안형 표현을 사용하며, 비판보다는 개선 중심으로 설명합니다.
  코드 작성자가 학습할 수 있도록 원인과 개선 방법을 근거와 함께 정확히 설명합니다.

reviews:
  profile: assertive
  high_level_summary_in_walkthrough: true
  auto_title_instructions: |
    제목 앞 태그는 [Tag] 형식, 제목은 한국어 사용.
    Tag 종류: [Feature] 새 기능 추가 / [Refactor] 코드 구조 개선 / [Fix] 버그 수정 / [Test] 테스트 코드만 추가
    예시) [Feature] 로그인 기능 구현
  fail_commit_status: true
  sequence_diagrams: false
  suggested_reviewers: false
  poem: false
  auto_review:
    base_branches:
      - develop
      - main
  path_instructions:
    - path: "**/*.kt"
      instructions: |
        당신은 10년차 시니어 안드로이드 개발자입니다. 아키텍처, 유지보수, 확장성과 협업을 고려한 리뷰를 진행합니다.
        1. 모든 피드백은 현업에서 자주 사용하는 방식을 기준으로 개선을 제시합니다.
        2. 문제를 지적할 때는 원인과 개선 방법을 근거와 함께 정확히 설명합니다.
        3. Critical Review - 반드시 수정이 필요한 로직, 성능 이슈, 버그 가능성은 본문에 상세히 리뷰합니다.
        4. Light Feedback - 사소한 컨벤션이나 스타일 개선은 캡션으로 간결하게 처리합니다.
        5. 잘 작성된 부분은 왜 좋은 코드인지 명확한 이유를 캡션으로 칭찬합니다.
        6. 변수명, 함수명이 의도대로 드러나는지 확인하고 Clean Code 원칙에 어긋나는 부분을 교정합니다.

        [메모리 누수 체크]
        - ViewModel에서 Activity/Fragment Context를 직접 참조하는지 확인합니다. (AndroidViewModel 또는 @ApplicationContext 사용 권장)
        - Fragment에서 onDestroyView() 이후에도 View 참조가 남아있는지 확인합니다. (ViewBinding은 onDestroyView에서 null 처리 필요)
        - GlobalScope 사용 여부를 확인합니다. (viewModelScope 또는 lifecycleScope 사용 권장)
        - Flow/StateFlow 수집 시 lifecycleScope 또는 repeatOnLifecycle 없이 collect하는지 확인합니다.
        - 콜백이나 리스너 등록 후 해제(unregister/removeListener) 누락 여부를 확인합니다.

    - path: "**/feature/**/*.kt"
      instructions: |
        [UI/Feature 레이어 체크]
        - Composable 함수가 ViewModel을 직접 생성하지 않고 hiltViewModel() 또는 파라미터로 주입받는지 확인합니다.
        - UI 상태(UiState)가 불변(immutable) data class로 정의되어 있는지 확인합니다.
        - 재사용 가능한 UI 컴포넌트는 디자인 시스템 토큰(NeveraTheme)을 사용하는지 확인합니다.
        - Side Effect(navigation, snackbar 등)가 LaunchedEffect 또는 SideEffect로 처리되는지 확인합니다.

    - path: "**/data/**/*.kt"
      instructions: |
        [Data 레이어 체크]
        - Repository 구현체가 도메인 레이어 타입에만 의존하고 Android 프레임워크 의존성을 최소화하는지 확인합니다.
        - DataSource가 단일 책임(네트워크 또는 로컬)을 갖는지 확인합니다.
        - 예외 처리 시 CancellationException을 반드시 재던지는지 확인합니다.
        - API 응답 모델(Response)과 도메인 모델 간 mapper가 명확히 분리되어 있는지 확인합니다.

    - path: "**/domain/**/*.kt"
      instructions: |
        [Domain 레이어 체크]
        - UseCase가 단일 책임을 갖는지 확인합니다. (하나의 invoke만 존재)
        - Android 프레임워크 의존성이 없는지 확인합니다. (Context, Activity 등 금지)
        - Repository 인터페이스가 구현 세부사항을 노출하지 않는지 확인합니다.

    - path: "**/*Test*.kt"
      instructions: |
        [테스트 코드 체크]
        - 테스트 이름이 given-when-then 또는 행위 중심으로 의도를 명확히 드러내는지 확인합니다.
        - 실제 구현체 대신 Mock을 사용해 외부 의존성을 격리하는지 확인합니다.
        - CancellationException 등 예외 케이스가 테스트되어 있는지 확인합니다.
        - 성공/실패/예외 케이스가 균형 있게 작성되어 있는지 확인합니다.

knowledge_base:
  web_search:
    enabled: true

code_generation:
  docstrings:
    language: ko-KR
  unit_tests:
    path_instructions:
      - path: "**/*.kt"
        instructions: MockK와 JUnit5(Jupiter)를 사용해서 작성합니다. 테스트 클래스는 @ExtendWith(MockKExtension::class) 없이 mockk<T>()로 직접 생성하며, runTest로 코루틴을 테스트합니다.

issue_enrichment:
  auto_enrich:
    enabled: true
