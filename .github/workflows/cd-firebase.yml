name: CD - Firebase App Distribution

on:
  push:
    branches:
      - develop
      - 'release/**'
  workflow_dispatch:   # 수동 트리거 (긴급 배포 시 사용)
    # 브랜치 선택 없이 트리거하면 기본 브랜치에서 실행되므로 검증 step에서 차단

concurrency:
  group: cd-firebase-${{ github.ref }}
  cancel-in-progress: true

jobs:
  distribute:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write        # Draft Release 조회에 push access 필요
      pull-requests: read   # PR 목록 조회용

    steps:
      - name: Validate branch (workflow_dispatch only)
        if: github.event_name == 'workflow_dispatch'
        run: |
          if [[ "$GITHUB_REF" != "refs/heads/develop" && "$GITHUB_REF" != refs/heads/release/* ]]; then
            echo "::error::workflow_dispatch는 develop 또는 release/* 브랜치에서만 실행할 수 있습니다. (현재: $GITHUB_REF)"
            exit 1
          fi

      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0   # release 브랜치의 merge-base 탐색에 필요

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle packages
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', 'build-logic/src/**/*.kt', 'gradle/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Restore debug keystore
        run: |
          mkdir -p keystore
          echo "${{ secrets.DEBUG_KEYSTORE_BASE64 }}" | base64 --decode > keystore/debug.keystore

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon
        env:
          GOOGLE_WEB_CLIENT_ID: ${{ secrets.GOOGLE_WEB_CLIENT_ID }}

      # develop·release/*: Draft Release 전체 내용 사용 (Release Drafter 연동)
      - name: Generate release notes
        id: notes
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          NOTES=$(gh api "repos/$GITHUB_REPOSITORY/releases" \
            --jq '[.[] | select(.draft == true)] | first | .body // ""' \
            2>/dev/null || echo "")

          DELIMITER="EOF_$(openssl rand -hex 8)"
          echo "notes<<$DELIMITER" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "$DELIMITER" >> $GITHUB_OUTPUT

      # develop 브랜치 → 개발자 그룹에만 배포
      - name: Upload to Firebase (developers)
        if: github.ref == 'refs/heads/develop'
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_APP_ID }}
          serviceCredentialsFileContent: ${{ secrets.CREDENTIAL_FILE_CONTENT }}
          groups: android-developers
          file: app/build/outputs/apk/debug/app-debug.apk
          releaseNotes: |
            브랜치: ${{ github.ref_name }}
            빌드: #${{ github.run_number }}

            ${{ steps.notes.outputs.notes }}

      # release/* 브랜치 → 개발자 + QA + 팀 전체 배포
      - name: Upload to Firebase (qa-and-team)
        if: startsWith(github.ref, 'refs/heads/release/')
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_APP_ID }}
          serviceCredentialsFileContent: ${{ secrets.CREDENTIAL_FILE_CONTENT }}
          groups: android-developers, qa-and-team
          file: app/build/outputs/apk/debug/app-debug.apk
          releaseNotes: |
            브랜치: ${{ github.ref_name }}
            빌드: #${{ github.run_number }}

            ${{ steps.notes.outputs.notes }}