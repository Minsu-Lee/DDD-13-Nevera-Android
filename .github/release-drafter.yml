name-template: 'v$RESOLVED_VERSION'
tag-template: 'v$RESOLVED_VERSION'

categories:
  - title: '✨ 새 기능'
    labels:
      - 'feat'
      - 'feature'
  - title: '🐛 버그 수정'
    labels:
      - 'fix'
      - 'bug'
  - title: '🎨 디자인 변경'
    labels:
      - 'design'
      - 'ui'
  - title: '⚡️ 성능 개선'
    labels:
      - 'perf'
      - 'performance'
  - title: '🔧 내부 작업'
    labels:
      - 'chore'
      - 'refactor'
      - 'ci'
      - 'test'
      - 'docs'

exclude-labels:
  - 'skip-changelog'

version-resolver:
  major:
    labels:
      - 'breaking-change'
  minor:
    labels:
      - 'feat'
      - 'feature'
  default: patch

no-changes-template: '변경사항 없음'

change-template: "- $TITLE @$AUTHOR (#$NUMBER)"
change-title-escapes: '\<*_&'

template: |
  ## 변경사항

  $CHANGES
